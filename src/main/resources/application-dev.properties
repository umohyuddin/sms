server.port=8085

server.error.whitelabel.enabled=false



#Lazy relations CANNOT load
#If code tries to access them ? Hibernate throws LazyInitializationException
#Jackson serializer cannot load lazy fields
#DTO mappers cannot accidentally access lazy relations
#You get ONLY the fields you fetched
spring.jpa.open-in-view=false



spring.datasource.url= jdbc:mysql://localhost:3306/sms
#spring.datasource.url= jdbc:mysql://db:3306/students
spring.datasource.username= root
spring.datasource.password= rootpassword123



# Flyway settings (optional)
#spring.flyway.baseline-on-migrate=true
#spring.flyway.locations=classpath:db/migration


# Disable automatic schema generation
spring.jpa.hibernate.ddl-auto=none

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always
spring.datasource.retry-attempts=5
spring.datasource.retry-delay=5s

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect



# application.properties
spring.security.userEntity.name=Admin
spring.security.userEntity.password=Admin123

jwt.secret=mySuperSecretKeyForJWTThatIsAtLeast32CharsLong
jwt.expirationTime=36000000


